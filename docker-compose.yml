services:
  # Banco de Dados (MongoDB)
  mongodb:
    image: mongo:6-jammy
    container_name: florita_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: florita_admin
      MONGO_INITDB_ROOT_PASSWORD: florita_secure_pass
      MONGO_INITDB_DATABASE: florita_db
    volumes:
      - mongo_data:/data/db

  # Camada de Cache (Redis)
  redis:
    image: redis:7-alpine
    container_name: florita_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Backend (Node.js + Express + Mongoose)
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: florita_api
    restart: always
    ports:
      - "3333:3333"
    environment:
      - PORT=3333
      - DATABASE_URL=mongodb://florita_admin:florita_secure_pass@mongodb:27017/florita_db?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=florita_token_ultra_secreto_2026
      - JWT_EXPIRATION=5m
    depends_on:
      - mongodb
      - redis

  # Frontend (Next.js 15)
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: florita_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3333
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data: